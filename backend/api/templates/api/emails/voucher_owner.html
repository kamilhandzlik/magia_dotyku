<!doctype html>
<html>
  <body style="margin: 0; padding: 0; background-color: #f4f4f4">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center"></td>

        <td align="center">
          <table
            width="600"
            cellpadding="20"
            cellspacing="0"
            style="
              background: #ffffff;
              border-radius: 10px;
              font-family: Arial, sans-serif;
            "
          >
            <!-- HEADER -->
            <tr>
              <td
                style="
                  text-align: center;
                  background: #9b6f62;
                  color: white;
                  border-radius: 10px 10px 0 0;
                "
              >
                <h1>Magia Dotyku</h1>
              </td>
            </tr>

            <!-- CONTENT -->
            <tr>
              <td>
                <h1>Nowe zgłoszenie na zakup bonu podarunkowego</h1>
                <h2>
                  zakupu bonu podarunkowego na dzień {{ date }} o godzinie {{
                  hour }}.
                </h2>
                <h2>Adres email klienta: {{ email }}</h2>
                <h2>Imię kupującego: {{ nameBuyer }}</h2>
                <h2>Imię obdarowanego: {{ nameRecipient }}</h2>

                <h2>Pamiętaj żeby się skontaktować.</h2>
              </td>
            </tr>

            <!-- FOOTER -->
            <tr>
              <td style="text-align: center; font-size: 12px; color: #888">
                © 2026 Magia Dotyku
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>

</html>
