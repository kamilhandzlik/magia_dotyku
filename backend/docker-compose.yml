services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magia-dotyku-backend
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:latest
    container_name: magia-dotyku-db
    environment:
      POSTGRES_USER: postgresqluser
      POSTGRES_PASSWORD: postgresqlpassword
      POSTGRES_DB: magiadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
